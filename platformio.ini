; ── Shared settings ──────────────────────────────────────────
[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.3.1
    ayushsharma82/ElegantOTA @ 3.1.7

; ── Common build flags for all envs ───────────────────────────
; Display: Freenove ESP32-S3 Display FNK0104AB
;   ILI9341_2 2.8" IPS  240×320 px
;   Pins from official Freenove FNK0104AB_2.8_240x320_ILI9341 User_Setup:
;     MOSI       → GPIO 11
;     MISO       → GPIO 13
;     CLK        → GPIO 12
;     CS         → GPIO 10
;     DC         → GPIO 46
;     RST        → -1  (tied to chip RESET via CHIP_PU)
;     BL         → GPIO 45  (TFT_eSPI controls, HIGH = on)
[common]
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_ON
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=11
    -DTFT_MISO=13
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=46
    -DTFT_RST=-1
    -DTFT_BL=45
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=27000000
    -DUSE_HSPI_PORT=1

; ── Freenove ESP32-S3 — USB (first flash) ─────────────────────
[env:freenove-s3-display]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
build_flags = ${common.build_flags}

; ── Freenove ESP32-S3 — OTA ───────────────────────────────────
[env:freenove-s3-ota]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
build_flags = ${common.build_flags}
upload_protocol = espota
; OTA by mDNS name (recommended): set to this unit's device name + .local
; Previous fixed IP was 192.168.1.9
upload_port = freenove-non-touch-display.local
